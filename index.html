<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Swan API CORS Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.5; }
        button { 
            background: #0078d7; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            display: block;
        }
        button:hover { background: #0063b1; }
        pre { background: #f5f5f5; padding: 10px; border: 1px solid #ddd; overflow: auto; }
    </style>
</head>
<body>
    <h1>Swan API CORS Test</h1>
    <p>Origin: <strong id="origin"></strong></p>
    
    <h2>API Tests</h2>
    <button onclick="testCORS()">Test CORS Configuration</button>
    <button onclick="testAuthWithCookies()">Test Authentication with Cookies</button>
    <button onclick="testWithToken()">Test with X-Swan-Authenticator-Token</button>
    <button onclick="runPhoneModification()">Run Phone Modification</button>
    
    <h2>Results:</h2>
    <pre id="output">Results will appear here...</pre>

    <script>
        // Display origin
        document.getElementById('origin').textContent = window.location.origin;
        
        // Log function
        function log(message) {
            const output = document.getElementById('output');
            output.textContent += new Date().toLocaleTimeString() + ": " + message + "\n";
            console.log(message);
        }
        
        // Test CORS configuration
        async function testCORS() {
            log("Testing CORS configuration...");
            
            try {
                const response = await fetch("https://api.swan.io/admin/graphql", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        query: "{ __schema { queryType { name } } }"
                    })
                });
                
                log("Response status: " + response.status);
                
                // Log CORS headers
                log("CORS Headers:");
                for (const [key, value] of response.headers.entries()) {
                    if (key.toLowerCase().startsWith("access-control")) {
                        log(`  ${key}: ${value}`);
                    }
                }
                
                const data = await response.text();
                log("Response: " + data);
            } catch (error) {
                log("Error: " + error.message);
            }
        }
        
        // Test with cookies
        async function testAuthWithCookies() {
            log("Testing authentication with cookies...");
            
            try {
                const response = await fetch("https://api.swan.io/admin-auth/graphql", {
                    method: "POST",
                    credentials: "include", // This sends cookies
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        query: "{ user { id mobilePhoneNumber firstName lastName } }"
                    })
                });
                
                log("Response status: " + response.status);
                
                const data = await response.text();
                log("Response: " + data);
            } catch (error) {
                log("Error: " + error.message);
            }
        }
        
        // Test with token
        async function testWithToken() {
            log("Testing with X-Swan-Authenticator-Token...");
            
            // See if token exists in storage
            let token = localStorage.getItem("swan_token") || 
                       sessionStorage.getItem("swan_token") ||
                       prompt("Enter your Swan token (or check browser storage):");
            
            if (!token) {
                log("No token provided");
                return;
            }
            
            try {
                const response = await fetch("https://api.swan.io/admin-auth/graphql", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Swan-Authenticator-Token": token
                    },
                    body: JSON.stringify({
                        query: "{ user { id mobilePhoneNumber firstName lastName } }"
                    })
                });
                
                log("Response status: " + response.status);
                
                const data = await response.text();
                log("Response: " + data);
                
                // Try also as Bearer token
                const response2 = await fetch("https://api.swan.io/admin-auth/graphql", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        query: "{ user { id mobilePhoneNumber firstName lastName } }"
                    })
                });
                
                log("Bearer token response status: " + response2.status);
                
                const data2 = await response2.text();
                log("Bearer token response: " + data2);
            } catch (error) {
                log("Error: " + error.message);
            }
        }
        
        // Run phone modification
        async function runPhoneModification() {
            log("Running phone modification...");
            
            // Generate random phone
            const randomDigits = Math.floor(10000000 + Math.random() * 90000000);
            const newPhone = "+336" + randomDigits.toString().substring(1);
            const oldPhone = "+33600000001"; // Fallback
            
            try {
                // First try with cookies
                log("Attempting with cookies");
                const responseCookies = await fetch("https://api.swan.io/admin-auth/graphql", {
                    method: "POST",
                    credentials: "include", // Include cookies
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        query: `
                        mutation {
                            startPhoneNumberModification(input:{
                                oldPhoneNumber:"${oldPhone}",
                                newPhoneNumber:"${newPhone}"
                            }) {
                                __typename
                                ... on StartPhoneNumberModificationSuccessPayload {
                                    phoneNumberModification { id }
                                }
                                ... on PhoneNumberModificationAlreadyExistsRejection { message }
                                ... on TooManyPhoneNumberModificationRejection { message }
                            }
                        }`
                    })
                });
                
                log("Cookie-based response status: " + responseCookies.status);
                const dataCookies = await responseCookies.text();
                log("Cookie-based response: " + dataCookies);
                
                // Check browser storage for tokens
                const tokenKeys = ['swan_token', 'auth_token', 'token'];
                let foundToken = null;
                
                // Look in localStorage
                for (const key of tokenKeys) {
                    const value = localStorage.getItem(key);
                    if (value && typeof value === 'string' && value.includes('.') && value.startsWith('ey')) {
                        foundToken = value;
                        log(`Found token in localStorage.${key}`);
                        break;
                    }
                }
                
                // Look in sessionStorage if not found in localStorage
                if (!foundToken) {
                    for (const key of tokenKeys) {
                        const value = sessionStorage.getItem(key);
                        if (value && typeof value === 'string' && value.includes('.') && value.startsWith('ey')) {
                            foundToken = value;
                            log(`Found token in sessionStorage.${key}`);
                            break;
                        }
                    }
                }
                
                // Try with token if found
                if (foundToken) {
                    log("Attempting with Bearer token");
                    const responseToken = await fetch("https://api.swan.io/admin-auth/graphql", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${foundToken}`
                        },
                        body: JSON.stringify({
                            query: `
                            mutation {
                                startPhoneNumberModification(input:{
                                    oldPhoneNumber:"${oldPhone}",
                                    newPhoneNumber:"${newPhone}"
                                }) {
                                    __typename
                                    ... on StartPhoneNumberModificationSuccessPayload {
                                        phoneNumberModification { id }
                                    }
                                    ... on PhoneNumberModificationAlreadyExistsRejection { message }
                                    ... on TooManyPhoneNumberModificationRejection { message }
                                }
                            }`
                        })
                    });
                    
                    log("Token-based response status: " + responseToken.status);
                    const dataToken = await responseToken.text();
                    log("Token-based response: " + dataToken);
                }
            } catch (error) {
                log("Error: " + error.message);
            }
        }
        
        // Initial check
        log("Page loaded at " + new Date().toLocaleString());
        log("Origin: " + window.location.origin);
    </script>
</body>
</html>
